<!DOCTYPE html>
<html>
<head>
    <title>Register Event</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f6f9;
            text-align:center;
            padding-top:120px;
        }

        .box{
            width:400px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:8px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
        }

        h2{
            color:#333;
        }

        .btn{
            padding:12px 25px;
            margin:10px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        .register{
            background:#28a745;
            color:white;
        }

        .cancel{
            background:#dc3545;
            color:white;
        }

    </style>

</head>

<body>

<div class="box">

<h2>Confirm Event Registration</h2>

<p>Are you sure you want to register for this event?</p>

<a href="/register-event/{{event_id}}">
<button class="btn register">Confirm Registration</button>
</a>

<a href="/student-events">
<button class="btn cancel">Cancel</button>
</a>

</div>

</body>
</html>
