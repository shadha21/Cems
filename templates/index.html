<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CEMS | College Event Management System</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>

body{
margin:0;
font-family:Segoe UI, Arial;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
}

/* HERO SECTION */

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;

background:
linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
url("https://images.unsplash.com/photo-1562774053-701939374585");

background-size:cover;
background-position:center;
}

/* GLASS CARD */

.overlay{
max-width:750px;
padding:45px;
border-radius:18px;

background:rgba(255,255,255,0.12);
backdrop-filter:blur(14px);

box-shadow:0 12px 35px rgba(0,0,0,0.35);
}

/* TITLE */

.overlay h1{
font-size:42px;
margin-bottom:10px;
letter-spacing:1px;
}

/* SUBTEXT */

.overlay p{
font-size:18px;
line-height:1.6;
color:#f1f1f1;
margin-bottom:35px;
}

/* BUTTON GROUP */

.btn-group{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

/* BUTTON STYLE */

.btn{
padding:14px 28px;
border-radius:30px;
text-decoration:none;
font-weight:600;
transition:0.3s;
font-size:16px;
}

/* PRIMARY BUTTON */

.btn-primary{
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
}

.btn-primary:hover{
transform:translateY(-3px);
box-shadow:0 8px 18px rgba(0,0,0,0.4);
}

/* SECONDARY BUTTON */

.btn-secondary{
background:rgba(255,255,255,0.18);
color:white;
border:1px solid rgba(255,255,255,0.3);
}

.btn-secondary:hover{
background:rgba(255,255,255,0.28);
transform:translateY(-3px);
}

</style>

</head>

<body>

<div class="hero">

<div class="overlay">

<h1>🎓 CEMS</h1>

<h2>College Event Management System</h2>

<p>
📅 Discover exciting campus events <br>
🎭 Participate in cultural, technical and sports programs <br>
🤝 Connect students, clubs and administrators in one smart platform
</p>

<div class="btn-group">

<a href="/student-login" class="btn btn-secondary">
👨‍🎓 Student Login
</a>

<a href="/admin-login" class="btn btn-secondary">
🛠 Admin Login
</a>

<a href="/events" class="btn btn-primary">
📢 View Events
</a>

</div>

</div>

</div>

</body>
</html>
